<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <!-- Dark outer square -->
  <rect x="50" y="50" width="300" height="300" fill="#2c2c2c"/>

  <!-- White bars (perfectly centered) -->
  <!-- Bar 1: Short (60px height) -->
  <rect x="90" y="220" width="40" height="60" fill="#ffffff"/>

  <!-- Bar 2: Tallest (140px height) -->
  <rect x="150" y="140" width="40" height="140" fill="#ffffff"/>

  <!-- Bar 3: Tall (125px height) -->
  <rect x="210" y="155" width="40" height="125" fill="#ffffff"/>

  <!-- Bar 4: Short (60px height) -->
  <rect x="270" y="220" width="40" height="60" fill="#ffffff"/>
</svg>
